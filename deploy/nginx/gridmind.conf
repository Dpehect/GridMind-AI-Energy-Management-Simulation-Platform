server {
    listen 80;
    server_name gridmind.example.com;

    client_max_body_size 100m;

    location / {
        proxy_pass http://gridmind:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Correlation-ID $request_id;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /api/health/live {
        proxy_pass http://gridmind:3000/api/health/live;
        access_log off;
    }

    location /api/health/ready {
        proxy_pass http://gridmind:3000/api/health/ready;
        access_log off;
    }
}
